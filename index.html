<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg text-center">
        <h1 class="text-3xl font-bold mb-6">Rock Paper Scissors</h1>
        <div class="mb-6">
            <button id="rock" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mr-2">Rock</button>
            <button id="paper" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mr-2">Paper</button>
            <button id="scissors" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Scissors</button>
        </div>
        <div id="result" class="text-xl mb-4"></div>
        <div id="computer-choice" class="text-lg"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
